version: '3.8'

services:
  nomikos-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomikos-ui
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    environment:
      # Add environment variables here if needed
      - NODE_ENV=production
    # Uncomment to add resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M

  # Development service with hot-reload support
  nomikos-ui-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nomikos-ui-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    # Only run this if you explicitly run: docker-compose -f docker-compose.yml run nomikos-ui-dev
    profiles:
      - dev
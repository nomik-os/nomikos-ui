name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run TypeScript check
      - name: TypeScript check
        run: npx tsc --noEmit

      # Step 5: Build the project
      - name: Build
        run: npm run build

      # Step 6: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 7: Log in to Docker Hub (update with your credentials)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 8: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/nomikos-ui:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/nomikos-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 9: Success notification (optional)
      - name: Build and push complete
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Docker image pushed: ${{ secrets.DOCKER_HUB_USERNAME }}/nomikos-ui:latest"
          echo "To deploy, pull the image and run: docker-compose up -d"
